<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Случайный фильм</title>
    <!-- Tailwind CSS для красивого минималистичного оформления -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
        }
    </style>
</head>
<body class="text-slate-100 flex items-center justify-center min-h-screen p-4">

    <!-- STREAMING_CHUNK: Отрисовка карточки и кнопки... -->
    <!-- Основной контейнер-карточка -->
    <div class="w-full max-w-md bg-slate-800 border border-slate-700/50 p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-xs font-bold tracking-widest text-purple-400 uppercase mb-4">Что посмотреть?</h1>
        
        <!-- Поле вывода названия фильма -->
        <div id="movie-display" class="text-xl sm:text-2xl font-extrabold text-white min-h-[80px] flex items-center justify-center px-4 mb-6 transition-all duration-300">
            Нажмите кнопку ниже 👇
        </div>
        
        <!-- Кнопка генерации -->
        <button id="get-movie-btn" class="w-full py-4 px-6 bg-purple-600 hover:bg-purple-500 active:scale-[0.98] transition duration-200 text-white font-bold rounded-2xl shadow-lg shadow-purple-600/20">
            Выбрать случайный фильм
        </button>
    </div>

    <!-- STREAMING_CHUNK: Создание простой базы фильмов и логики выбора... -->
    <script>
        // Простая база культовых фильмов
        const moviesDatabase = [
            "Побег из Шоушенка",
            "Зеленая миля",
            "Форрест Гамп",
            "1+1 (Неприкасаемые)",
            "Начало",
            "Интерстеллар",
            "Бойцовский клуб",
            "Криминальное чтиво",
            "Темный рыцарь",
            "Матрица",
            "Гладиатор",
            "Престиж",
            "Остров проклятых",
            "Леон",
            "Назад в будущее",
            "Джентльмены",
            "Волк с Уолл-стрит",
            "Законопослушный гражданин",
            "Шоу Трумана",
            "Одержимость",
            "Достучаться до небес",
            "Семь",
            "Бойцовский клуб",
            "Безумный Макс: Дорога ярости",
            "Паразиты"
        ];

        const btn = document.getElementById('get-movie-btn');
        const display = document.getElementById('movie-display');

        // Обработка клика по кнопке
        btn.addEventListener('click', () => {
            // Случайный индекс из массива
            const randomIndex = Math.floor(Math.random() * moviesDatabase.length);
            
            // Вывод фильма на экран с небольшим эффектом анимации
            display.style.opacity = 0;
            setTimeout(() => {
                display.textContent = moviesDatabase[randomIndex];
                display.style.opacity = 1;
            }, 150);
        });
    </script>
</body>
</html>
