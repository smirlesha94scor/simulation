<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Фильмов</title>
    <!-- Tailwind CSS для современного и быстрого оформления -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Подключаем иконки FontAwesome для визуальной привлекательности -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b 0%, #090514 100%);
            overflow: hidden;
            user-select: none;
        }

        /* Мягкое неоновое свечение для кнопки */
        .neon-btn {
            box-shadow: 0 0 20px rgba(147, 51, 234, 0.3);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-btn:hover {
            box-shadow: 0 0 30px rgba(147, 51, 234, 0.6);
            transform: translateY(-1px);
        }
        .neon-btn:active {
            transform: translateY(1px) scale(0.98);
        }

        /* Стеклянная карточка */
        .glass-card {
            background: rgba(15, 12, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Эффект размытия при быстрой прокрутке названий */
        .motion-blur {
            filter: blur(3px);
            opacity: 0.6;
            transform: scale(0.97);
        }
    </style>
</head>
<body class="text-slate-100 flex flex-col items-center justify-center min-h-screen p-4 relative">

    <!-- -->
    <!-- Фоновые декоративные световые пятна -->
    <div class="absolute w-[300px] h-[300px] bg-purple-600/10 rounded-full blur-[120px] top-1/4 left-1/4 pointer-events-none"></div>
    <div class="absolute w-[300px] h-[300px] bg-pink-600/10 rounded-full blur-[120px] bottom-1/4 right-1/4 pointer-events-none"></div>

    <!-- Основная карточка приложения -->
    <div class="w-full max-w-md glass-card p-8 sm:p-10 rounded-3xl shadow-2xl text-center relative z-10 transition-all duration-300 hover:border-purple-500/10">
        
        <!-- Иконка проектора над заголовком -->
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-purple-500/10 border border-purple-500/20 text-purple-400 mb-5">
            <i class="fa-solid fa-clapperboard text-2xl"></i>
        </div>

        <h1 class="text-xs font-bold tracking-widest text-purple-400 uppercase mb-3">Кино на вечер</h1>
        
        <!-- Экран вывода названия фильма -->
        <div id="movie-display" class="text-xl sm:text-2xl font-extrabold text-white min-h-[110px] flex items-center justify-center px-4 mb-8 transition-all duration-150 leading-snug">
            Нажмите кнопку ниже 👇
        </div>
        
        <!-- Кнопка случайного выбора -->
        <button id="get-movie-btn" class="w-full py-4 px-6 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 text-white font-bold text-base tracking-wide rounded-2xl neon-btn flex items-center justify-center gap-2.5">
            <i class="fa-solid fa-shuffle text-sm"></i>
            <span>Выбрать случайный фильм</span>
        </button>

    </div>

    <!-- -->
    <script>
        // База популярных фильмов
        const moviesDatabase = [
            "Побег из Шоушенка", "Зеленая миля", "Форрест Гамп", "1+1 (Неприкасаемые)", "Начало",
            "Интерстеллар", "Бойцовский клуб", "Криминальное чтиво", "Темный рыцарь", "Матрица",
            "Гладиатор", "Престиж", "Остров проклятых", "Леон", "Назад в будущее",
            "Джентльмены", "Волк с Уолл-стрит", "Законопослушный гражданин", "Шоу Трумана", "Одержимость",
            "Достучаться до небес", "Семь", "Безумный Макс: Дорога ярости", "Паразиты", "Карты, деньги, два ствола",
            "Большой куш", "Клан Сопрано", "Пираты Карибского моря", "Властелин колец", "Гарри Поттер",
            "Один дома", "Терминатор 2", "Чужой", "Нечто", "Парк Юрского периода",
            "Звездные войны", "Аватар", "Титаник", "Ла-Ла Ленд", "Джанго освобожденный",
            "Бесславные ублюдки", "Омерзительная восьмерка", "Город бога", "Жизнь прекрасна", "Пианист",
            "Список Шиндлера", "Молчание ягнят", "Поймай меня, если сможешь", "Игры разума", "Семь жизней",
            "Семь самураев", "Крестный отец", "Лицо со шрамом", "Казино", "Славные парни",
            "Ирландец", "Джокер", "Таксист", "Драйв", "Стрингер",
            "Гран Торино", "Малышка на миллион", "Хороший, плохой, злой", "Двенадцать обезьян",
            "Шестое чувство", "Реквием по мечте", "Черный лебедь", "Рестлер",
            "Малхолланд Драйв", "Твин Пикс", "Синий бархат", "Старикам тут не место", "Фарго",
            "Большой Лебовски", "После прочтения сжечь", "Железная хватка", "Амели", "12 лет рабства",
            "Зеленая книга", "Отель Гранд Будапешт", "Королевство полной луны", "Бегущий по лезвию 2049", "Прибытие",
            "Пленницы", "Убийца (Sicario)", "Пожары", "Авиатор", "Отступники",
            "Банды Нью-Йорка", "Марсианин", "Прометей", "Черный ястреб",
            "Первому игроку приготовиться", "Челюсти", "Индиана Джонс", "Инопланетянин"
        ];

        const btn = document.getElementById('get-movie-btn');
        const display = document.getElementById('movie-display');
        let isSpinning = false;

        // Генерация щелчка при смене названия (Web Audio API)
        function playTickSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.04);
                
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } catch (e) {
                // Игнорируем блокировки автовоспроизведения
            }
        }

        // Клик по кнопке выбора фильма
        btn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            btn.disabled = true;

            let elapsed = 0;
            const duration = 800; // Продолжительность "кручения" в мс
            let speed = 40;       // Начальная скорость смены фильмов в мс

            // Добавляем эффект размытия в движении
            display.classList.add('motion-blur');

            function spin() {
                const randomMovie = moviesDatabase[Math.floor(Math.random() * moviesDatabase.length)];
                display.textContent = randomMovie;
                playTickSound();

                elapsed += speed;
                
                if (elapsed < duration) {
                    // Плавно замедляем перебор названий к концу анимации
                    speed = 40 + Math.pow(elapsed / duration, 2.5) * 150;
                    setTimeout(spin, speed);
                } else {
                    // Анимация завершена — убираем размытие и возвращаем кнопку
                    display.classList.remove('motion-blur');
                    isSpinning = false;
                    btn.disabled = false;
                }
            }

            spin();
        });
    </script>
</body>
</html>
